<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeStays - Modern Hotel Booking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">HOTEL URMILA International</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#rooms">Our Rooms</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Experience Luxury Like Never Before</h1>
            <p>Book your perfect stay with us and enjoy a premium experience.</p>
            <a href="#rooms" class="btn">View Rooms</a>
        </div>
    </section>

    <section id="rooms" class="rooms-section">
        <h2>Select Your Room</h2>
        <div class="room-grid" id="room-grid">
            </div>
    </section>
<div id="room-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                
                <div class="modal-gallery">
                    <img id="main-modal-img" src="" alt="Room Main Image">
                    <div class="thumbnail-container" id="thumbnail-container">
                        </div>
                </div>

                <div class="modal-info">
                    <h3 id="modal-title">Room Title</h3>
                    <p id="modal-desc">Room description goes here.</p>
                    <div class="price-details">
                        <p>Total Price: ₹<span id="modal-total-price">0</span> / night</p>
                        <p class="highlight">Advance Required (50%): ₹<span id="modal-advance">0</span></p>
                    </div>
                    
                    <form id="booking-form">
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Email Address" required>
                        <input type="date" required title="Check-in Date">
                        <button type="submit" class="btn checkout-btn">Pay Advance & Book</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
